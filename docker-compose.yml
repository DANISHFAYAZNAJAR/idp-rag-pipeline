services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-idprag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idprag}
      POSTGRES_DB: ${POSTGRES_DB:-idprag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-idprag} -d ${POSTGRES_DB:-idprag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: ["api"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DB_WAIT_TIMEOUT: 120
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-idprag}:${POSTGRES_PASSWORD:-idprag}@postgres:5432/${POSTGRES_DB:-idprag}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-idprag}:${POSTGRES_PASSWORD:-idprag}@postgres:5432/${POSTGRES_DB:-idprag}
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /data/chroma_store
      LOCAL_STORAGE_PATH: /data/uploads
      LOG_FILE: /data/logs/app.jsonl
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8080}
      ENABLE_WEAVE: ${ENABLE_WEAVE:-false}
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    volumes:
      - app_data:/data
    networks:
      - app_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8080}/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  worker:
    build: .
    command: ["worker"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      DB_WAIT_TIMEOUT: 120
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-idprag}:${POSTGRES_PASSWORD:-idprag}@postgres:5432/${POSTGRES_DB:-idprag}
      DATABASE_SYNC_URL: postgresql://${POSTGRES_USER:-idprag}:${POSTGRES_PASSWORD:-idprag}@postgres:5432/${POSTGRES_DB:-idprag}
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /data/chroma_store
      LOCAL_STORAGE_PATH: /data/uploads
      LOG_FILE: /data/logs/worker.jsonl
    volumes:
      - app_data:/data
    networks:
      - app_net
    depends_on:
      api:
        condition: service_healthy

  ui:
    build: .
    command: ["ui"]
    env_file:
      - .env
    environment:
      API_PUBLIC_URL: http://api:${API_PORT:-8080}
      UI_HOST: 0.0.0.0
      UI_PORT: ${UI_PORT:-8501}
      UI_BASE_PATH: ${UI_BASE_PATH:-}
    ports:
      - "${UI_PORT:-8501}:${UI_PORT:-8501}"
    networks:
      - app_net
    depends_on:
      api:
        condition: service_healthy

networks:
  app_net:
    driver: bridge

volumes:
  pgdata:
  app_data:
